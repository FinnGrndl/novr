name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Prepare Nuclear Option references
        shell: bash
        env:
          NUCLEAR_OPTION_GAME_DIR_VAR: ${{ vars.NUCLEAR_OPTION_GAME_DIR }}
          NUCLEAR_OPTION_REFERENCES_URL: ${{ secrets.NUCLEAR_OPTION_REFERENCES_URL }}
          NUCLEAR_OPTION_REFERENCES_TOKEN: ${{ secrets.NUCLEAR_OPTION_REFERENCES_TOKEN }}
        run: |
          selected_game_dir="${NUCLEAR_OPTION_GAME_DIR:-${NUCLEAR_OPTION_GAME_DIR_VAR:-}}"

          if [ -n "$NUCLEAR_OPTION_REFERENCES_URL" ]; then
            refs_dir="$RUNNER_TEMP/nuclear-option-references"
            refs_zip="$RUNNER_TEMP/nuclear-option-references.zip"
            release_json="$RUNNER_TEMP/nuclear-option-reference-release.json"
            rm -rf "$refs_dir"
            mkdir -p "$refs_dir"

            if [[ -n "$NUCLEAR_OPTION_REFERENCES_TOKEN" && "$NUCLEAR_OPTION_REFERENCES_URL" =~ ^https://github.com/([^/]+)/([^/]+)/releases/download/([^/]+)/(.+)$ ]]; then
              refs_repo="${BASH_REMATCH[1]}/${BASH_REMATCH[2]}"
              refs_tag="${BASH_REMATCH[3]}"
              refs_asset="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))' "${BASH_REMATCH[4]}")"

              echo "Downloading Nuclear Option reference asset '$refs_asset' from $refs_repo@$refs_tag."
              if ! curl -fsSL \
                -H "Authorization: Bearer $NUCLEAR_OPTION_REFERENCES_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$refs_repo/releases/tags/$refs_tag" \
                -o "$release_json"; then
                echo "::error::Failed to read private reference release $refs_repo@$refs_tag. Check that NUCLEAR_OPTION_REFERENCES_TOKEN can read that repository and that the tag exists."
                exit 1
              fi

              refs_asset_url="$(python3 - "$release_json" "$refs_asset" <<'PY'
          import json
          import sys

          release_path, asset_name = sys.argv[1], sys.argv[2]
          with open(release_path, encoding="utf-8") as handle:
              release = json.load(handle)

          for asset in release.get("assets", []):
              if asset.get("name") == asset_name:
                  print(asset["url"])
                  break
          else:
              print(f"::error::Could not find release asset: {asset_name}", file=sys.stderr)
              sys.exit(1)
          PY
          )"

              if ! curl -fsSL \
                -H "Authorization: Bearer $NUCLEAR_OPTION_REFERENCES_TOKEN" \
                -H "Accept: application/octet-stream" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$refs_asset_url" \
                -o "$refs_zip"; then
                echo "::error::Failed to download private reference asset '$refs_asset'. Check token access and release asset permissions."
                exit 1
              fi
            else
              curl_args=(-fsSL "$NUCLEAR_OPTION_REFERENCES_URL" -o "$refs_zip")
              if [ -n "$NUCLEAR_OPTION_REFERENCES_TOKEN" ]; then
                curl_args=(-H "Authorization: Bearer $NUCLEAR_OPTION_REFERENCES_TOKEN" "${curl_args[@]}")
              fi

              if ! curl "${curl_args[@]}"; then
                echo "::error::Failed to download the Nuclear Option reference archive from NUCLEAR_OPTION_REFERENCES_URL."
                exit 1
              fi
            fi

            unzip -q "$refs_zip" -d "$refs_dir"

            if [ -d "$refs_dir/NuclearOption_Data/Managed" ]; then
              selected_game_dir="$refs_dir"
            elif [ -d "$refs_dir/Managed" ]; then
              mkdir -p "$refs_dir/NuclearOption_Data"
              mv "$refs_dir/Managed" "$refs_dir/NuclearOption_Data/Managed"
              selected_game_dir="$refs_dir"
            elif compgen -G "$refs_dir/*.dll" >/dev/null; then
              mkdir -p "$refs_dir/NuclearOption_Data/Managed"
              mv "$refs_dir"/*.dll "$refs_dir/NuclearOption_Data/Managed/"
              selected_game_dir="$refs_dir"
            else
              echo "::error::Reference archive must contain NuclearOption_Data/Managed, Managed, or DLL files at its root."
              exit 1
            fi
          fi

          if [ -z "$selected_game_dir" ] || [ ! -d "$selected_game_dir/NuclearOption_Data/Managed" ]; then
            echo "::error::GitHub-hosted runners do not include Nuclear Option reference DLLs. Set repository secret NUCLEAR_OPTION_REFERENCES_URL to a private stripped-reference archive, or run this workflow on a runner where NUCLEAR_OPTION_GAME_DIR points at the game folder."
            exit 1
          fi

          echo "NUCLEAR_OPTION_GAME_DIR=$selected_game_dir" >> "$GITHUB_ENV"

      - name: Resolve NOVR version
        id: version
        shell: bash
        run: |
          version="$(perl -0ne 'print "$1\n" and exit if /\[BepInPlugin\(\s*"[^"]+",\s*"NOVR",\s*"([0-9]+\.[0-9]+\.[0-9]+)"/s' NOVR/NOVRPlugin.cs)"
          if [ -z "$version" ]; then
            echo "Could not read NOVR version from NOVR/NOVRPlugin.cs" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build NOVR release zip
        run: dotnet build NOVR.Build/NOVR.Build.csproj -c Release

      - name: Build installer artifacts
        run: dotnet build NOVR.Installer/NOVR.Installer.csproj -c Release

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          sha256sum NOVR.zip NOVR.Installer-Win.exe NOVR.Installer-Linux > checksums.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novr-${{ steps.version.outputs.version }}
          path: |
            dist/NOVR.zip
            dist/NOVR.Installer-Win.exe
            dist/NOVR.Installer-Linux
            dist/checksums.sha256

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          assets=(
            dist/NOVR.zip
            dist/NOVR.Installer-Win.exe
            dist/NOVR.Installer-Linux
            dist/checksums.sha256
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" --target "$GITHUB_SHA" --title "NOVR $TAG" --latest
          else
            gh release create "$TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "NOVR $TAG" \
              --generate-notes \
              --latest
          fi
