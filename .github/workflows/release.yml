name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve NOVR version
        id: version
        shell: bash
        run: |
          version="$(perl -0ne 'print "$1\n" and exit if /\[BepInPlugin\(\s*"[^"]+",\s*"NOVR",\s*"([0-9]+\.[0-9]+\.[0-9]+)"/s' NOVR/NOVRPlugin.cs)"
          if [ -z "$version" ]; then
            echo "Could not read NOVR version from NOVR/NOVRPlugin.cs" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build NOVR release zip
        run: dotnet build NOVR.Build/NOVR.Build.csproj -c Release

      - name: Build installer artifacts
        run: dotnet build NOVR.Installer/NOVR.Installer.csproj -c Release

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          sha256sum NOVR.zip NOVR.Installer-Win.exe NOVR.Installer-Linux > checksums.sha256

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novr-${{ steps.version.outputs.version }}
          path: |
            dist/NOVR.zip
            dist/NOVR.Installer-Win.exe
            dist/NOVR.Installer-Linux
            dist/checksums.sha256

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          assets=(
            dist/NOVR.zip
            dist/NOVR.Installer-Win.exe
            dist/NOVR.Installer-Linux
            dist/checksums.sha256
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" --target "$GITHUB_SHA" --title "NOVR $TAG" --latest
          else
            gh release create "$TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "NOVR $TAG" \
              --generate-notes \
              --latest
          fi
